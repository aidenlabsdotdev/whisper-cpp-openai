name: Publish image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # All-in-one image: whisper-server (compiled for Sapphire Rapids /
          # AMX) + Python shim. Single tag — :main-amx — keeps the package
          # listing clean and makes the AMX requirement explicit. Add other
          # tags here later if other ISA variants get published.
          tags: |
            type=raw,value=main-amx,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Skip the OCI index, provenance, and SBOM attestations — they
          # show up as separate untagged versions in GHCR's package
          # listing. For a single-platform build we want one tagged image.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
