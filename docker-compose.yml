services:
  whisper:
    image: ${WHISPER_IMAGE:-ghcr.io/aidenlabsdotdev/whisper.cpp:main-amx}
    build: ./whisper
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_THREADS: ${WHISPER_THREADS:-4}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
    volumes:
      - whisper-models:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 5m
    restart: unless-stopped

  shim:
    image: ${SHIM_IMAGE:-ghcr.io/aidenlabsdotdev/whisper-cpp-openai:latest}
    build: ./shim
    environment:
      WHISPER_URL: http://whisper:8080
      WHISPER_MODEL_NAME: ${WHISPER_MODEL:-large-v3}
      SHIM_API_KEY: ${SHIM_API_KEY:-}
    ports:
      - "${SHIM_PORT:-8000}:8000"
    depends_on:
      whisper:
        condition: service_healthy
    restart: unless-stopped

volumes:
  whisper-models:
